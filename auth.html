<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up - Ryuhuustore</title>

    <style>
        :root {
            --color-60: #0b0e14;
            --color-30: #131722;
            --color-10: #6366f1;
            --border-color: rgba(255, 255, 255, 0.05);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--color-60);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            padding: 2rem;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-card {
            background: var(--color-30);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .auth-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            padding: 5px;
            border-radius: 16px;
            margin-bottom: 2rem;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 12px;
            transition: var(--transition);
            color: var(--text-secondary);
        }

        .auth-tab.active {
            background: var(--color-10);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 12px 16px;
            color: white;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--color-10);
            background: rgba(255, 255, 255, 0.08);
        }

        .auth-btn {
            width: 100%;
            background: var(--color-10);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 1rem;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.3);
            background: #4f46e5;
        }

        .hidden {
            display: none;
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: var(--color-10);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 id="auth-title">Selamat Datang</h1>
                <p id="auth-subtitle">Silakan login untuk akses penuh</p>
            </div>

            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login">Login</div>
                <div class="auth-tab" id="tab-register">Daftar</div>
            </div>

            <!-- Login Form -->
            <form id="login-form">
                <div class="form-group">
                    <label>Alamat Email</label>
                    <input type="email" id="login-email" placeholder="nama@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="auth-btn">Masuk ke Akun</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="hidden">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="reg-name" placeholder="Nama Lengkap" required>
                </div>
                <div class="form-group">
                    <label>Alamat Email</label>
                    <input type="email" id="reg-email" placeholder="nama@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password Baru</label>
                    <input type="password" id="reg-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="auth-btn">Buat Akun Sekarang</button>
            </form>

            <div class="auth-footer">
                Kembali ke <a href="index.html">Beranda</a>
            </div>
        </div>
    </div>

    <script>
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');

        tabLogin.addEventListener('click', () => {
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
            authTitle.textContent = 'Selamat Datang';
            authSubtitle.textContent = 'Silakan login untuk akses penuh';
        });

        tabRegister.addEventListener('click', () => {
            tabRegister.classList.add('active');
            tabLogin.classList.remove('active');
            registerForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
            authTitle.textContent = 'Buat Akun';
            authSubtitle.textContent = 'Bergabung dengan Ryuhuustore hari ini';
        });

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            try {
                enforceRateLimit('login', 5, 2);
                loginUser(document.getElementById('login-email').value, document.getElementById('login-password').value);
                // Redirection is handled globally by auth.js on DOMContentLoaded after session is set
                // or we can force it if standard behavior is too slow:
                setTimeout(() => {
                    const prefix = typeof getAppPathPrefix === 'function' ? getAppPathPrefix() : '';
                    window.location.href = prefix + 'dashboard.html';
                }, 500);
            } catch (err) {
                // error handled by enforceRateLimit or loginUser
            }
        });

        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            try {
                enforceRateLimit('register', 3, 5);
                registerUser(
                    document.getElementById('reg-name').value,
                    document.getElementById('reg-email').value,
                    document.getElementById('reg-password').value
                );
                if (typeof ryuhuu_notify === 'function') {
                    ryuhuu_notify('Pendaftaran berhasil! Silakan login.', 'success');
                }
                setTimeout(() => {
                    tabLogin.click();
                }, 1500);
            } catch (err) {
                // error handled by enforceRateLimit
            }
        });
    </script>
    <script src="ui.js"></script>
    <script src="auth.js"></script>
    <script src="security.js"></script>
</body>

</html>
